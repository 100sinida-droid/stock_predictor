<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>TOP 100 - AptScore</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,sans-serif;background:linear-gradient(135deg,#667eea,#764ba2);min-height:100vh;padding:40px 20px}
.container{max-width:1400px;margin:0 auto}
.header{text-align:center;margin-bottom:40px}
.header h1{font-size:56px;color:#fff;margin-bottom:12px;text-shadow:0 4px 12px rgba(0,0,0,.3)}
.header p{font-size:20px;color:rgba(255,255,255,.9)}
.back-btn{display:inline-block;padding:14px 28px;background:rgba(255,255,255,.25);color:#fff;text-decoration:none;border-radius:12px;margin-bottom:32px;font-weight:600;backdrop-filter:blur(10px)}
.back-btn:hover{background:rgba(255,255,255,.35);transform:translateY(-2px)}
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(380px,1fr));gap:20px}
.card{background:#fff;border-radius:16px;padding:24px;box-shadow:0 4px 16px rgba(0,0,0,.1);transition:.3s;cursor:pointer}
.card:hover{transform:translateY(-6px);box-shadow:0 12px 32px rgba(0,0,0,.2)}
.rank{display:inline-flex;align-items:center;justify-content:center;min-width:56px;height:56px;padding:0 12px;border-radius:50%;font-weight:800;font-size:22px;margin-bottom:16px}
.r1{background:linear-gradient(135deg,#FFD700,#FFA500);color:#fff}
.r2{background:linear-gradient(135deg,#C0C0C0,#A8A8A8);color:#fff}
.r3{background:linear-gradient(135deg,#CD7F32,#B8860B);color:#fff}
.r4{background:#f0f0f0;color:#666}
.name{font-size:22px;font-weight:800;color:#1a1a1a;margin-bottom:8px}
.addr{font-size:14px;color:#666;margin-bottom:16px}
.score{display:flex;align-items:center;gap:16px}
.num{font-size:40px;font-weight:900}
.badge{padding:8px 16px;border-radius:8px;font-weight:800;font-size:16px}
.S{background:#059669;color:#fff}
.A{background:#2563eb;color:#fff}
.B{background:#d97706;color:#fff}
.medal{font-size:32px;margin-right:8px}
.loading{text-align:center;padding:80px;color:#fff;font-size:20px}
</style>
</head>
<body>
<div class="container">
<a href="index.html" class="back-btn">← 메인으로</a>
<div class="header">
<h1>🏆 TOP 100</h1>
<p>전국 최고 점수 아파트</p>
</div>
<div id="list" class="grid"><div class="loading">전체 DB에서 순위 계산 중...</div></div>
</div>
<script src="apt-db.js"></script>
<script>
// LOCATION_PREFERENCE, SCHOOL_SCORE, PRICE_MAP 정의
const LOCATION_PREFERENCE={'강남구':100,'서초구':100,'과천시':95,'송파구':95,'용산구':94,'종로구':92,'분당구':92,'판교':92,'잠실':92,'마포구':90,'양천구':88,'해운대구':88,'위례':88,'송도':88,'수지구':88,'성동구':86,'일산동구':85,'일산서구':85,'광교':85,'동탄':82,'세종시':82,'평촌':85,'목동':88,'여의도':95,'압구정':98};
const SCHOOL_SCORE={'강남구':95,'서초구':93,'송파구':90,'양천구':88,'노원구':85,'강동구':82,'마포구':80,'성동구':78,'용산구':85};
const PRICE_MAP={'강남구':12000,'서초구':11000,'송파구':7500,'용산구':9500,'마포구':8500,'성동구':7000,'강동구':6500,'양천구':7200,'김포시':2400};

function estimateGrade(a){
  if(!a)return{s:0,g:'D'};
  const gu=a.gu||'',dong=a.dong||'',yr=a.yr||0,sd=a.sd||9999,pr=a.price||0;
  let p1=70;
  for(let r in LOCATION_PREFERENCE){
    if(dong&&dong.includes(r)){p1=LOCATION_PREFERENCE[r];break;}
  }
  if(p1===70){
    for(let r in LOCATION_PREFERENCE){
      if(gu&&gu.includes(r)){p1=LOCATION_PREFERENCE[r];break;}
    }
  }
  if(p1===70&&(a.city==='서울'))p1=80;
  else if(p1===70&&(a.city==='경기'))p1=75;
  
  let p2=sd<=300?85:sd<=500?75:sd<=800?65:sd<=1500?55:sd<=3000?40:25;
  let p3=sd<=300?100:sd<=500?90:sd<=800?78:sd<=1200?63:sd<=2000?50:sd<=3000?38:sd<=4000?25:10;
  const isSeoul=(a.city==='서울'),isCap=(a.city==='서울'||a.city==='경기'||a.city==='인천');
  const bus=isSeoul?18:isCap?12:3;
  p3=Math.min(100,p3*.75+bus);
  
  const p4=SCHOOL_SCORE&&SCHOOL_SCORE[gu]?SCHOOL_SCORE[gu]:50;
  const p5=55;
  let p6=yr>=2023?95:yr>=2020?85:yr>=2018?75:yr>=2015?63:yr>=2012?52:yr>=2008?42:yr>=2003?33:yr>=1998?25:yr>0?15:50;
  let p7=50;
  if(pr>0){
    const guBase=PRICE_MAP&&PRICE_MAP[gu]?PRICE_MAP[gu]:2500;
    const ratio=pr/guBase;
    p7=Math.round(Math.max(0,Math.min(100,(1.4-ratio)/.8*100)));
  }
  const total=Math.round((p1*20+p2*20+p3*15+p4*15+p5*10+p6*10+p7*10)/100*10)/10;
  return{s:total,g:total>=80?'S':total>=70?'A':total>=60?'B':total>=50?'C':'D'};
}

// APT_DB를 parent에서 가져오거나 임시로 생성
let APT_DB=[];
try{
  if(window.opener&&window.opener.APT_DB){
    APT_DB=window.opener.APT_DB;
  }
}catch(e){}

// 임시 데이터 (실제로는 메인 페이지 DB 사용)
if(!APT_DB||APT_DB.length===0){
  APT_DB=[
    {n:'신반포자이',city:'서울',gu:'서초구',dong:'잠원동',a:'서울 서초구 신반포로194',yr:2020,sd:200,price:11200},
    {n:'래미안퍼스티지',city:'서울',gu:'서초구',dong:'반포동',a:'서울 서초구 신반포로11길31',yr:2009,sd:150,price:11500},
    {n:'반포자이',city:'서울',gu:'서초구',dong:'반포동',a:'서울 서초구 신반포로지하194',yr:2009,sd:350,price:11000},
    {n:'아크로리버파크',city:'서울',gu:'서초구',dong:'반포동',a:'서울 서초구 반포동131',yr:2016,sd:180,price:12800},
    {n:'올림픽파크포레온',city:'서울',gu:'송파구',dong:'오금동',a:'서울 송파구 올림픽로지하225',yr:2023,sd:320,price:5800},
  ];
}

// 전체 점수 계산
const scored=APT_DB.map(a=>{
  const res=estimateGrade(a);
  return{...a,score:res.s,grade:res.g};
}).filter(a=>a.score>0);

// 정렬
scored.sort((a,b)=>b.score-a.score);

// TOP 100
const top100=scored.slice(0,100);

// 렌더링
document.getElementById('list').innerHTML=top100.map((a,i)=>{
  const r=i+1;
  const rc=r===1?'r1':r===2?'r2':r===3?'r3':'r4';
  const m=r===1?'🥇':r===2?'🥈':r===3?'🥉':'';
  return`<div class="card" onclick="location.href='index.html?q=${encodeURIComponent(a.n)}'">
<div class="rank ${rc}">${m?'<span class="medal">'+m+'</span>':''}${r}</div>
<div class="name">${a.n}</div>
<div class="addr">📍 ${a.a||a.gu}</div>
<div class="score">
<span class="num" style="color:${a.grade==='S'?'#059669':a.grade==='A'?'#2563eb':'#d97706'}">${a.score}</span>
<span class="badge ${a.grade}">${a.grade}등급</span>
</div>
</div>`;
}).join('');
</script>
</body>
</html>
